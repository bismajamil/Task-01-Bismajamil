<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule-Based Chatbot - Dark UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 600px;
            background: #0f1419;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(59, 130, 246, 0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            text-align: center;
        }

        .header h1 {
            color: #3b82f6;
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .header p {
            color: #94a3b8;
            font-size: 12px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1419;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }

        /* Message Styles */
        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .bot-message .message-content {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-bottom-left-radius: 4px;
        }

        .welcome-message {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-style: italic;
        }

        /* Input Area */
        .input-area {
            padding: 16px;
            border-top: 2px solid rgba(59, 130, 246, 0.3);
            background: #0f1419;
            display: flex;
            gap: 10px;
        }

        .input-container {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
            background: #263549;
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        /* Button */
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Clear Button */
        .clear-btn {
            padding: 8px 12px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-size: 12px;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        /* Loading Animation */
        .typing {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                height: 80vh;
            }

            .message-content {
                max-width: 95%;
            }

            .header h1 {
                font-size: 20px;
            }
        }

        /* Scrollbar styling for Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #3b82f6 transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 ChatBot</h1>
            <p>Rule-Based AI Assistant - Dark Theme</p>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-message">
                <p>👋 Welcome to the ChatBot!</p>
                <p>Type 'help' to see what I can do</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type your message here... (or 'exit' to quit)"
                    autocomplete="off"
                >
                <button onclick="sendMessage()">Send</button>
                <button class="clear-btn" onclick="clearChat()">Clear</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');

        // Chatbot logic (same as Python version)
        function sanitizeInput(input) {
            return input.toLowerCase().trim();
        }

        function getGreetingResponse(input) {
            const greetings = ['hello', 'hi', 'hey', 'greetings', 'good morning', 
                             'good afternoon', 'good evening', 'howdy', 'sup'];
            if (greetings.includes(input)) {
                return "Hello! Welcome to the chatbot. How can I help you today?";
            }
            return null;
        }

        function getHowAreYouResponse(input) {
            const phrases = ['how are you', 'how are you doing', 'how are you today',
                           'how do you feel', 'what\'s up'];
            if (phrases.includes(input)) {
                return "I'm doing great, thank you for asking! I'm here to help you. What can I do for you?";
            }
            return null;
        }

        function getNameResponse(input) {
            const questions = ['what is your name', 'who are you', 'what\'s your name',
                             'tell me your name'];
            if (questions.includes(input)) {
                return "I'm a Rule-Based Chatbot, created to assist you with basic conversation!";
            }
            return null;
        }

        function getHelpResponse(input) {
            const commands = ['help', 'help me', 'what can you do', 'what are your features'];
            if (commands.includes(input)) {
                return `I can help you with:
• Greetings (say 'hello', 'hi', etc.)
• Tell you my name (ask 'who are you')
• Chat about how you're doing
• Answer questions about what I can do
• Exit when you're done (say 'bye', 'exit', etc.)

Type any message and I'll try to respond!`;
            }
            return null;
        }

        function getExitResponse(input) {
            const exits = ['exit', 'quit', 'bye', 'goodbye', 'see you', 'farewell', 'leave'];
            return exits.includes(input);
        }

        function getBotResponse(input) {
            let response = getGreetingResponse(input);
            if (response) return response;

            response = getHowAreYouResponse(input);
            if (response) return response;

            response = getNameResponse(input);
            if (response) return response;

            response = getHelpResponse(input);
            if (response) return response;

            return "I'm not sure how to respond to that. Type 'help' to see what I can do!";
        }

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            
            // Auto scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot-message';
            messageDiv.id = 'typing-indicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'typing';
            contentDiv.innerHTML = '<span></span><span></span><span></span>';
            
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function sendMessage() {
            const text = userInput.value.trim();
            
            if (!text) return;

            // Add user message
            addMessage(text, true);
            userInput.value = '';

            // Sanitize input
            const sanitized = sanitizeInput(text);

            // Check for exit
            if (getExitResponse(sanitized)) {
                setTimeout(() => {
                    addMessage("Goodbye! Thanks for chatting with me! 👋", false);
                }, 300);
                userInput.disabled = true;
                document.querySelector('button:not(.clear-btn)').disabled = true;
                return;
            }

            // Show typing indicator
            showTyping();

            // Get bot response after a short delay (simulating thinking)
            setTimeout(() => {
                removeTyping();
                const response = getBotResponse(sanitized);
                addMessage(response, false);
            }, 600);
        }

        function clearChat() {
            if (confirm('Are you sure you want to clear the chat?')) {
                chatArea.innerHTML = `
                    <div class="welcome-message">
                        <p>👋 Welcome to the ChatBot!</p>
                        <p>Type 'help' to see what I can do</p>
                    </div>
                `;
                userInput.value = '';
                userInput.disabled = false;
                document.querySelector('button:not(.clear-btn)').disabled = false;
                userInput.focus();
            }
        }

        // Handle Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus input on load
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
